<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessor Control Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: #2d2d2d; color: #fff; padding: 20px 30px; border-radius: 8px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header p { font-size: 13px; color: #ccc; margin-top: 4px; }
        .header-right { text-align: right; }
        .role-label { font-size: 12px; color: #999; margin-bottom: 4px; }
        .role-value { font-size: 16px; color: #f4b942; font-weight: 500; }
        .section { background: #fff; border-radius: 8px; padding: 30px; margin-bottom: 30px; }
        .section-title { font-size: 18px; font-weight: 600; color: #2d2d2d; margin-bottom: 10px; display: flex; align-items: center; }
        .section-title::before { content: ''; width: 4px; height: 24px; background: #f4b942; border-radius: 2px; margin-right: 15px; }
        .section-description { font-size: 13px; color: #666; margin-bottom: 25px; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: #f9f9f9; border-bottom: 2px solid #e0e0e0; }
        th { padding: 12px; text-align: left; font-weight: 600; color: #333; }
        td { padding: 12px; border-bottom: 1px solid #e0e0e0; }
        tr:hover { background: #fafafa; }
        input[type="text"],
        input[type="email"],
        input[type="date"],
        select {
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
            width: 100%;
        }
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: #f4b942;
            box-shadow: 0 0 0 2px rgba(244, 185, 66, 0.1);
        }
        .loading { text-align: center; padding: 40px; color: #666; font-size: 14px; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #f4b942; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message { color: #d32f2f; padding: 12px; background: #ffebee; border-radius: 4px; margin-bottom: 15px; font-size: 13px; }
        .success-message { color: #388e3c; padding: 12px; background: #e8f5e9; border-radius: 4px; margin-bottom: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Assessor Control Hub</h1>
                <p>Manage learner progress, complete observation records, and mark unit work below.</p>
            </div>
            <div class="header-right">
                <div class="role-label">Current role:</div>
                <div class="role-value">Assessor</div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Learner Unit Access &amp; Marking</h2>
            <p class="section-description">Update learner access statuses for each unit, track progress, and mark submitted work. Changes save automatically.</p>
            <div id="content">
                <div class="loading"><span class="spinner"></span>Loading learner data...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qwjejqqgkvkroqhmfglg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_D9A-jP6vvE6OhTm8cpxhPA_hR25r8tj';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadLearnerData() {
            try {
                const { data, error } = await supabaseClient
                    .from('learner_unit_access')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    document.getElementById('content').innerHTML = `<div class="error-message">Error loading data: ${error.message}</div>`;
                    return;
                }

                if (!data || data.length === 0) {
                    document.getElementById('content').innerHTML = '<div class="loading">No learner data available.</div>';
                    return;
                }

                renderTable(data);
            } catch (err) {
                document.getElementById('content').innerHTML = `<div class="error-message">Error: ${err.message}</div>`;
            }
        }

        function renderTable(records) {
            let html = '<div class="table-container"><table><thead><tr><th>Learner</th><th>Unit Name</th><th>Access Status</th><th>Unit Status</th><th>Marked As</th></tr></thead><tbody>';

            records.forEach(record => {
                html += `
                    <tr>
                        <td>${record.learner_id || 'N/A'}</td>
                        <td>${record.unit_name || 'N/A'}</td>
                        <td>
                            <select onchange="updateField('${record.id}', 'access_status', this.value)">
                                <option value="active" ${record.access_status === 'active' ? 'selected' : ''}>Active</option>
                                <option value="inactive" ${record.access_status === 'inactive' ? 'selected' : ''}>Inactive</option>
                                <option value="suspended" ${record.access_status === 'suspended' ? 'selected' : ''}>Suspended</option>
                            </select>
                        </td>
                        <td>
                            <select onchange="updateField('${record.id}', 'unit_status', this.value)">
                                <option value="not_started" ${record.unit_status === 'not_started' ? 'selected' : ''}>Not Started</option>
                                <option value="in_progress" ${record.unit_status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                                <option value="completed" ${record.unit_status === 'completed' ? 'selected' : ''}>Completed</option>
                            </select>
                        </td>
                        <td>
                            <select onchange="updateField('${record.id}', 'marked_as', this.value)">
                                <option value="pending" ${record.marked_as === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="passed" ${record.marked_as === 'passed' ? 'selected' : ''}>Passed</option>
                                <option value="failed" ${record.marked_as === 'failed' ? 'selected' : ''}>Failed</option>
                            </select>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table></div>';
            document.getElementById('content').innerHTML = html;
        }

        async function updateField(id, field, value) {
            try {
                const { error } = await supabaseClient
                    .from('learner_unit_access')
                    .update({ [field]: value })
                    .eq('id', id);

                if (error) {
                    alert(`Error updating: ${error.message}`);
                } else {
                    console.log(`Updated ${field} for record ${id}`);
                }
            } catch (err) {
                alert(`Error: ${err.message}`);
            }
        }

        loadLearnerData();
    </script>
</body>
</html>
