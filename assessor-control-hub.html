<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessor Control Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: #2d2d2d; color: #fff; padding: 20px 30px; border-radius: 8px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header p { font-size: 13px; color: #ccc; margin-top: 4px; }
        .header-right { text-align: right; }
        .role-label { font-size: 12px; color: #999; margin-bottom: 4px; }
        .role-value { font-size: 16px; color: #f4b942; font-weight: 500; }
        .section { background: #fff; border-radius: 8px; padding: 30px; margin-bottom: 30px; }
        .section-title { font-size: 18px; font-weight: 600; color: #2d2d2d; margin-bottom: 10px; display: flex; align-items: center; }
        .section-title::before { content: ''; width: 4px; height: 24px; background: #f4b942; border-radius: 2px; margin-right: 15px; }
        .section-description { font-size: 13px; color: #666; margin-bottom: 25px; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: #f9f9f9; border-bottom: 2px solid #e0e0e0; }
        th { padding: 12px; text-align: left; font-weight: 600; color: #333; }
        td { padding: 12px; border-bottom: 1px solid #e0e0e0; }
        tr:hover { background: #fafafa; }
        input[type="text"],
        input[type="email"],
        input[type="date"],
        select {
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
            width: 100%;
        }
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: #f4b942;
            box-shadow: 0 0 0 2px rgba(244, 185, 66, 0.1);
        }
        .loading { text-align: center; padding: 40px; color: #666; font-size: 14px; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #f4b942; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message { color: #d32f2f; padding: 12px; background: #ffebee; border-radius: 4px; margin-bottom: 15px; font-size: 13px; }
        .success-message { color: #388e3c; padding: 12px; background: #e8f5e9; border-radius: 4px; margin-bottom: 15px; font-size: 13px; }
        .learner-group { margin-bottom: 20px; background: white; border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden; }
        .learner-header { background: #2d2d2d; color: white; padding: 14px 16px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .learner-header:hover { background: #3d3d3d; }
        .toggle-icon { font-size: 14px; margin-left: 8px; opacity: 0.7; }
        .units-table { width: 100%; border-collapse: collapse; display: none; }
        .units-table.expanded { display: table; }
        .units-table th { background: #f9f9f9; padding: 12px; text-align: left; font-weight: 600; border-bottom: 1px solid #e0e0e0; font-size: 12px; }
        .units-table td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .units-table tr:hover { background: #fafafa; }
        .unit-name { font-weight: 600; color: #2d2d2d; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 3px; font-size: 11px; font-weight: 600; }
        .status-allowed { background: #c8e6c9; color: #2e7d32; }
        .status-locked { background: #ffcdd2; color: #c62828; }
        .toggle-btn { padding: 6px 12px; border: 1px solid #ccc; background: white; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
        .toggle-btn:hover:not(:disabled) { background: #e9ecef; border-color: #999; }
        .toggle-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .toggle-btn.enable { color: #2e7d32; border-color: #c8e6c9; }
        .toggle-btn.disable { color: #c62828; border-color: #ffcdd2; }
        .btn-feedback { display: inline-block; margin-left: 8px; font-size: 11px; }
        .btn-success { color: #2e7d32; }
        .btn-error { color: #c62828; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Assessor Control Hub</h1>
                <p>Manage learner progress, complete observation records, and mark unit work below.</p>
            </div>
            <div class="header-right">
                <div class="role-label">Current role:</div>
                <div class="role-value">Assessor</div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Learner Unit Access &amp; Marking</h2>
            <p class="section-description">Update learner access statuses for each unit, track progress, and mark submitted work. Changes save automatically.</p>
            <div id="content">
                <div class="loading"><span class="spinner"></span>Loading learner data...</div>
            </div>
            <div id="learnersContainer" style="display: none;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qwjejqqgkvkroqhmfglg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_D9A-jP6vvE6OhTm8cpxhPA_hR25r8tj';

        let supabaseClient;
        console.log('Script loading Supabase library...');

        // Ensure Supabase is available before creating client
        function initSupabase() {
            if (!window.supabase) {
                console.log('Supabase not ready, retrying...');
                setTimeout(initSupabase, 100);
                return;
            }
            console.log('Supabase library loaded, creating client...');
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            loadLearnerData();
        }

        async function loadLearnerData() {
            try {
                console.log('Starting data fetch...');
                
                const { data, error } = await supabaseClient
                    .from('learner_unit_access')
                    .select('*');
                
                console.log('Fetch response:', { data, error });

                if (error) {
                    console.error('Supabase error:', error);
                    document.getElementById('content').innerHTML = `<div class="error-message">Error loading data: ${error.message}</div>`;
                    document.getElementById('learnersContainer').style.display = 'none';
                    return;
                }

                if (!data || data.length === 0) {
                    console.warn('No records returned');
                    document.getElementById('content').innerHTML = '<div class="loading">No learner data available.</div>';
                    document.getElementById('learnersContainer').style.display = 'none';
                    return;
                }

                console.log(`Loaded ${data.length} records`);
                renderTable(data);
            } catch (err) {
                console.error('Fetch error:', err);
                document.getElementById('content').innerHTML = `<div class="error-message">Error: ${err.message}</div>`;
                document.getElementById('learnersContainer').style.display = 'none';
            }
        }

        function renderTable(records) {
            // Group records by learner
            const grouped = {};
            records.forEach(record => {
                if (!grouped[record.learner_id]) {
                    grouped[record.learner_id] = [];
                }
                grouped[record.learner_id].push(record);
            });

            const container = document.getElementById('learnersContainer');
            container.innerHTML = '';
            document.getElementById('content').style.display = 'none';

            Object.keys(grouped).sort().forEach((learnerId, index) => {
                const units = grouped[learnerId];
                const groupEl = createLearnerGroup(learnerId, units, index === 0);
                container.appendChild(groupEl);
            });

            container.style.display = 'block';
        }

        function createLearnerGroup(learnerId, units, expandByDefault = false) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'learner-group';

            const shortId = learnerId.substring(0, 12) + '...';
            const header = document.createElement('div');
            header.className = 'learner-header';
            header.innerHTML = `
                <span>Learner: ${shortId}</span>
                <span class="toggle-icon">▼</span>
            `;
            groupDiv.appendChild(header);

            const table = document.createElement('table');
            table.className = 'units-table';
            if (expandByDefault) table.classList.add('expanded');
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Unit</th>
                        <th>Access Status</th>
                        <th>Unit Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;

            const tbody = table.querySelector('tbody');
            units.forEach(unit => {
                const isAllowed = unit.access_status === 'allowed';
                const btnText = isAllowed ? 'Lock Unit' : 'Enable Unit';
                const btnClass = isAllowed ? 'disable' : 'enable';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="unit-name">${unit.unit_name}</td>
                    <td><span class="status-badge status-${unit.access_status}">${unit.access_status}</span></td>
                    <td>${unit.unit_status || '—'}</td>
                    <td>
                        <button class="toggle-btn ${btnClass}" onclick="toggleUnitAccess('${unit.id}', '${learnerId}', ${isAllowed})" data-unit-id="${unit.id}">${btnText}</button>
                        <span class="btn-feedback" data-feedback-id="${unit.id}"></span>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            groupDiv.appendChild(table);

            // Toggle expand/collapse
            header.addEventListener('click', () => {
                table.classList.toggle('expanded');
                const icon = header.querySelector('.toggle-icon');
                icon.textContent = table.classList.contains('expanded') ? '▲' : '▼';
            });

            // Set initial icon
            header.querySelector('.toggle-icon').textContent = expandByDefault ? '▲' : '▼';

            return groupDiv;
        }

        async function toggleUnitAccess(unitId, learnerId, isCurrentlyAllowed) {
            const newStatus = isCurrentlyAllowed ? 'locked' : 'allowed';
            const btn = document.querySelector(`button[data-unit-id="${unitId}"]`);
            const feedback = document.querySelector(`span[data-feedback-id="${unitId}"]`);

            btn.disabled = true;
            btn.style.opacity = '0.5';

            try {
                const { error } = await supabaseClient
                    .from('learner_unit_access')
                    .update({ access_status: newStatus })
                    .eq('id', unitId);

                if (error) {
                    console.error('Update error:', error);
                    feedback.className = 'btn-feedback btn-error';
                    feedback.textContent = '✗ Error';
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    setTimeout(() => { feedback.textContent = ''; }, 3000);
                } else {
                    feedback.className = 'btn-feedback btn-success';
                    feedback.textContent = '✓ Updated';
                    setTimeout(() => loadLearnerData(), 800); // Reload to show changes
                }
            } catch (err) {
                console.error('Error:', err);
                feedback.className = 'btn-feedback btn-error';
                feedback.textContent = '✗ Error';
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }

        // Load data when both Supabase and DOM are ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initSupabase);
        } else {
            initSupabase();
        }
    </script>
</body>
</html>
