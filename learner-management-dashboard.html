<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT Academy Learner Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; color: #333; }
        .header { background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); color: #d4af37; padding: 30px 20px; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 20px; }
        .logo-shield { height: 60px; display: flex; align-items: center; }
        .logo-shield img { height: 60px; width: auto; }
        .header h1 { font-size: 32px; color: #d4af37; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid #d4af37; background: white; padding: 15px 20px; }
        .tab-btn { padding: 10px 20px; border: none; background: transparent; cursor: pointer; font-size: 16px; color: #666; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #d4af37; border-bottom-color: #d4af37; font-weight: 600; }
        .tab-content { display: none; background: white; padding: 30px; }
        .tab-content.active { display: block; }
        .section-header { border-left: 4px solid #d4af37; padding-left: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        .required { color: #d4af37; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; font-family: inherit; }
        input:focus, select:focus { outline: none; border-color: #d4af37; }
        .btn { padding: 12px 24px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #d4af37; color: #1a1a1a; }
        .btn-primary:hover { background: #f0e68c; }
        .success-message { background: #d1e7dd; color: #0f5132; padding: 15px; border-radius: 4px; margin-bottom: 20px; border-left: 4px solid #198754; }
        .error-message { background: #f8d7da; color: #842029; padding: 15px; border-radius: 4px; margin-bottom: 20px; border-left: 4px solid #dc3545; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo-shield">
                <img src="pt-academy-logo.png" alt="PT Academy Logo">
            </div>
            <div>
                <h1>PT Academy Learner Management</h1>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab(this, 'enrol')">Enrol Learner</button>
            <button class="tab-btn" onclick="showTab(this, 'roster')">Learner Roster</button>
            <button class="tab-btn" onclick="showTab(this, 'assign')">Assign Units</button>
            <button class="tab-btn" onclick="showTab(this, 'progress')">Track Progress</button>
        </div>

        <div id="enrol" class="tab-content active">
            <div class="section-header">
                <h2>Enrol New Learner</h2>
            </div>
            <div id="enrolMessage"></div>
            <div class="form-group">
                <label>Full Name <span class="required">*</span></label>
                <input type="text" id="fullName">
            </div>
            <div class="form-group">
                <label>Email Address <span class="required">*</span></label>
                <input type="email" id="email">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone">
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob">
            </div>
            <div class="form-group">
                <label>Programme Start Date <span class="required">*</span></label>
                <input type="date" id="startDate">
            </div>
            <button class="btn btn-primary" onclick="enrollLearner()">Enrol Learner</button>
        </div>

        <div id="roster" class="tab-content">
            <div class="section-header">
                <h2>Learner Roster</h2>
            </div>
            <div id="rosterContent">No learners yet</div>
        </div>

        <div id="assign" class="tab-content">
            <div class="section-header">
                <h2>Assign Units</h2>
            </div>
            <div id="assignContent">Assign units to learners</div>
        </div>

        <div id="progress" class="tab-content">
            <div class="section-header">
                <h2>Track Progress</h2>
            </div>
            <div id="progressContent">Track learner progress</div>
        </div>
    </div>

    <script>
        var supabase = null;

        // Initialize Supabase when page loads
        window.addEventListener('load', function() {
            console.log('Page loaded, initializing Supabase...');
            try {
                const supabaseUrl = 'https://qwjejqqgkvkroqhmfglg.supabase.co';
                const supabaseKey = 'sb_publishable_D9A-jP6vvE6OhTm8cpxhPA_hR25r8tj';
                
                // Wait for Supabase to be available
                if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
                    console.error('Supabase library not loaded');
                    return;
                }
                
                supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                console.log('✓ Supabase initialized successfully');
            } catch (error) {
                console.error('Error initializing Supabase:', error);
            }
        });

        // Tab switching function
        function showTab(button, tabName) {
            var allTabs = document.querySelectorAll('.tab-content');
            var allButtons = document.querySelectorAll('.tab-btn');
            
            allTabs.forEach(function(tab) {
                tab.classList.remove('active');
            });
            allButtons.forEach(function(btn) {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            button.classList.add('active');
        }

        // Enrol learner function - THIS IS THE KEY FUNCTION
        function enrollLearner() {
            console.log('===== ENROL BUTTON CLICKED =====');
            
            var fullName = document.getElementById('fullName').value.trim();
            var email = document.getElementById('email').value.trim();
            var phone = document.getElementById('phone').value.trim();
            var dob = document.getElementById('dob').value.trim();
            var startDate = document.getElementById('startDate').value.trim();
            
            console.log('Captured values:', {fullName, email, phone, dob, startDate});
            
            // Validation
            if (!fullName || !email || !startDate) {
                showMessage('enrolMessage', 'ERROR: Please fill in Full Name, Email, and Programme Start Date', 'error');
                console.warn('Validation failed - missing required fields');
                return;
            }
            
            // Check if Supabase is ready
            if (!supabase) {
                showMessage('enrolMessage', 'ERROR: Supabase connection failed. Refresh the page.', 'error');
                console.error('Supabase is not initialized');
                return;
            }
            
            console.log('Starting insert into Supabase...');
            showMessage('enrolMessage', 'Processing enrolment...', 'success');
            
            // Call Supabase insert
            supabase
                .from('learners')
                .insert([{
                    full_name: fullName,
                    email: email,
                    phone: phone || null,
                    date_of_birth: dob || null,
                    programme_start_date: startDate
                }])
                .then(function(result) {
                    console.log('Supabase response received:', result);
                    
                    if (result.error) {
                        console.error('Supabase error:', result.error);
                        showMessage('enrolMessage', 'ERROR: ' + result.error.message, 'error');
                        return;
                    }
                    
                    console.log('SUCCESS! Data returned:', result.data);
                    showMessage('enrolMessage', 'SUCCESS: ' + fullName + ' has been enrolled!', 'success');
                    
                    // Clear form
                    document.getElementById('fullName').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('phone').value = '';
                    document.getElementById('dob').value = '';
                    document.getElementById('startDate').value = '';
                })
                .catch(function(error) {
                    console.error('Catch block error:', error);
                    showMessage('enrolMessage', 'ERROR: ' + error.message, 'error');
                });
        }

        // Show message function
        function showMessage(elementId, message, type) {
            var element = document.getElementById(elementId);
            if (!element) {
                console.error('Message element not found:', elementId);
                return;
            }
            
            element.textContent = message;
            element.className = (type === 'error') ? 'error-message' : 'success-message';
            console.log('Message displayed:', message);
            
            // Clear after 6 seconds
            setTimeout(function() {
                element.textContent = '';
                element.className = '';
            }, 6000);
        }
    </script>
</body>
</html>
