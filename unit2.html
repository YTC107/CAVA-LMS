<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 2 Evidence Worksheet | PT Academy CAVA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
    .gold { background: #c9a84c; }
    .gold-text { color: #c9a84c; }
    .nav-bar { background: #2d2d2d; }
    .card { background: #ffffff08; border: 1px solid #ffffff15; }
    .section-header { background: #2d2d2d; border-left: 4px solid #c9a84c; }
    .lo-card { background: #ffffff05; border: 1px solid #ffffff10; }
    .lo-card.passed { background: #1a3a1a; border-color: #2d6a2d; }
    .lo-card.referred { background: #3a1a1a; border-color: #6a2d2d; }
    .ac-row { background: #ffffff03; border: 1px solid #ffffff08; }
    .toggle-passed { background: #2d6a2d; }
    .toggle-referred { background: #8b2020; }
    .toggle-off { background: #444; }
    .badge-passed { background: #1a3a1a; color: #4caf50; border: 1px solid #2d6a2d; font-size: 0.7rem; padding: 2px 10px; border-radius: 999px; display: inline-block; }
    .badge-referred { background: #3a1a1a; color: #f44336; border: 1px solid #6a2d2d; font-size: 0.7rem; padding: 2px 10px; border-radius: 999px; display: inline-block; }
    .step-label { color: #c9a84c; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    input, select, textarea { background: #ffffff10; border: 1px solid #ffffff20; color: white; }
    input::placeholder, textarea::placeholder { color: #999; }
    textarea { font-family: 'Segoe UI', sans-serif; resize: vertical; }
    input[type='date']::-webkit-calendar-picker-indicator { filter: invert(0.7); }
    .checkbox { width: 1.1rem; height: 1.1rem; accent-color: #c9a84c; }
    .lo-status-btn { border-radius: 4px; padding: 6px 14px; font-size: 0.7rem; font-weight: 700; cursor: pointer; min-width: 60px; border: 1px solid; transition: all 0.2s; }
    .error { color: #f44336; font-size: 0.75rem; margin-top: 4px; }
  </style>
</head>
<body class="min-h-screen">

  <!-- HEADER -->
  <div style="background:#1a1a2e;" class="px-6 py-4 flex items-center justify-between border-b border-white border-opacity-10">
    <div class="flex items-center gap-4">
      <img src="https://ytc107.github.io/CAVA-LMS/pt-academy-logo.png" alt="PT Academy" class="h-10">
      <div>
        <div class="text-white font-bold text-lg leading-tight">Unit 2 Evidence Worksheet</div>
        <div class="text-xs" style="color:#c9a84c;">Assess Occupational Competence in the Work Environment</div>
      </div>
    </div>
    <button onclick="window.history.back()" class="gold text-black text-xs font-bold px-4 py-2 rounded-lg hover:opacity-90">← Back</button>
  </div>

  <!-- NAV -->
  <div class="nav-bar px-6 py-2 text-xs text-gray-400">
    Trainee Assessor: <span id="traineeName" class="text-white font-semibold">Loading...</span>
  </div>

  <!-- MAIN FORM -->
  <div class="max-w-5xl mx-auto px-4 py-8">
    <form id="worksheetForm" onsubmit="submitForm(event)">

      <!-- LEARNING OUTCOMES SECTION -->
      <div id="loContainer" class="space-y-6 mb-8">
        <!-- LOs generated by JavaScript -->
      </div>

      <!-- DECLARATION SECTION -->
      <div class="card rounded-xl p-6 mb-8">
        <div class="section-header -mx-6 -mt-6 px-6 py-3 mb-6">
          <div class="text-white font-bold text-base">Declaration</div>
        </div>

        <div class="space-y-4 mb-6">
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="checkbox" id="declPlagiarism" class="checkbox mt-1" />
            <span class="text-xs text-gray-300">I confirm that this evidence is the trainee's own work and has not been plagiarised.</span>
          </label>
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="checkbox" id="declAccuracy" class="checkbox mt-1" />
            <span class="text-xs text-gray-300">I confirm that the information provided is accurate and truthful.</span>
          </label>
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="checkbox" id="declConsent" class="checkbox mt-1" />
            <span class="text-xs text-gray-300">The trainee has consented to the use of this evidence for assessment purposes.</span>
          </label>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-white border-opacity-10">
          <div>
            <div class="text-xs text-gray-400 mb-2 font-semibold">Trainee Name</div>
            <input type="text" id="traineeSigName" placeholder="Trainee full name" class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none" />
          </div>
          <div>
            <div class="text-xs text-gray-400 mb-2 font-semibold">Trainee Signature</div>
            <input type="text" id="traineeSigDate" placeholder="e.g. John Smith" class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none" />
          </div>
        </div>
      </div>

      <!-- OVERALL ASSESSMENT OUTCOME -->
      <div class="card rounded-xl p-6 mb-8">
        <div class="section-header -mx-6 -mt-6 px-6 py-3 mb-6">
          <div class="text-white font-bold text-base">Overall Assessment Outcome</div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
          <button type="button" id="overallPassBtn" onclick="setOverallStatus('pass')" class="toggle-off text-white text-sm font-bold py-3 rounded-lg hover:opacity-90 transition-all">
            PASS
          </button>
          <button type="button" id="overallReferBtn" onclick="setOverallStatus('refer')" class="toggle-off text-white text-sm font-bold py-3 rounded-lg hover:opacity-90 transition-all">
            REFERRED
          </button>
        </div>

        <div>
          <div class="text-xs text-gray-400 mb-2 font-semibold">Overall Feedback</div>
          <textarea id="overallFeedback" placeholder="Provide overall feedback on the trainee's performance..." class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none" rows="4"></textarea>
        </div>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="flex gap-4 mb-10">
        <button type="submit" class="gold text-black text-sm font-bold px-6 py-3 rounded-lg hover:opacity-90 flex-1">
          Submit Assessment
        </button>
        <button type="button" onclick="window.history.back()" class="bg-gray-700 text-white text-sm font-bold px-6 py-3 rounded-lg hover:bg-gray-600">
          Cancel
        </button>
      </div>

      <div id="statusMsg" class="text-center text-xs mb-4"></div>

    </form>
  </div>

  <div class="text-center py-4 text-xs text-gray-600">Focus Awards Level 3 CAVA · Trainee Assessment</div>

<script>
  const SUPABASE_URL = 'https://qwjejqqgkvkroqhmfglg.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_D9A-jP6vvE6OhTm8cpxhPA_hR25r8tj';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const UNIT_CONFIG = {
    unit: 'unit2',
    label: 'Unit 2',
    los: [
      {
        key: 'LO1',
        title: 'Know and understand the main agreed assessment and competence frameworks and regulations in own sector',
        acs: ['AC 1.1', 'AC 1.2', 'AC 1.3', 'AC 1.4']
      },
      {
        key: 'LO2',
        title: 'Understand how to assess occupational competence in the workplace',
        acs: ['AC 2.1', 'AC 2.2', 'AC 2.3', 'AC 2.4']
      },
      {
        key: 'LO3',
        title: 'Be able to assess occupational competence in the workplace',
        acs: ['AC 3.1', 'AC 3.2', 'AC 3.3']
      },
      {
        key: 'LO4',
        title: 'Be able to maintain and develop knowledge and skills in assessing occupational competence',
        acs: ['AC 4.1', 'AC 4.2']
      }
    ]
  };

  let assessorUser = null;
  let traineeId = null;
  let traineeName = null;
  let currentRecord = null;
  let loOutcomes = {};
  let overallStatus = 'pass';

  // Initialize
  async function init() {
    const userRaw = localStorage.getItem('cava_user');
    if (!userRaw) { window.location.href = 'login.html'; return; }
    assessorUser = JSON.parse(userRaw);

    const params = new URLSearchParams(window.location.search);
    traineeId = params.get('learner');
    if (!traineeId) { alert('No trainee selected. Missing learner parameter.'); return; }

    await loadTraineeInfo();
    await loadExistingRecord();
    renderLOs();
  }

  async function loadTraineeInfo() {
    const { data, error } = await sb.from('learners').select('id, full_name, username').eq('id', traineeId).single();
    if (!error && data) {
      traineeName = data.full_name || data.username;
      document.getElementById('traineeName').textContent = traineeName;
      document.getElementById('traineeSigName').value = traineeName;
    }
  }

  async function loadExistingRecord() {
    const { data, error } = await sb.from('unit_overrides')
      .select('*')
      .eq('user_id', traineeId)
      .eq('unit', UNIT_CONFIG.unit)
      .order('id', { ascending: false })
      .limit(1)
      .single();

    if (data) {
      currentRecord = data;
      
      // Parse lo_dates JSON
      let loDates = {};
      if (data.lo_dates) {
        try {
          loDates = JSON.parse(data.lo_dates);
        } catch(e) {}
      }

      // Initialize loOutcomes from existing record
      UNIT_CONFIG.los.forEach(lo => {
        const loData = loDates[lo.key];
        loOutcomes[lo.key] = {
          status: loData?.status || '',
          date: loData?.date || '',
          feedback: loData?.feedback || ''
        };
      });

      // Set overall status
      overallStatus = data.status === 'referred' ? 'refer' : 'pass';
      document.getElementById('overallFeedback').value = data.feedback || '';
      updateOverallButtons();
    } else {
      // Initialize empty outcomes
      UNIT_CONFIG.los.forEach(lo => {
        loOutcomes[lo.key] = { status: '', date: '', feedback: '' };
      });
    }
  }

  function renderLOs() {
    const container = document.getElementById('loContainer');
    container.innerHTML = UNIT_CONFIG.los.map(lo => {
      const outcome = loOutcomes[lo.key];
      const statusClass = outcome.status === 'pass' ? 'passed' : outcome.status === 'refer' ? 'referred' : '';
      const btnClass = outcome.status === 'pass' ? 'toggle-passed' : outcome.status === 'refer' ? 'toggle-referred' : 'toggle-off';
      const btnLabel = outcome.status === 'pass' ? 'Pass' : outcome.status === 'refer' ? 'Refer' : 'Not Assessed';

      return `
        <div class="lo-card ${statusClass} rounded-xl p-6">
          <div class="flex items-start justify-between mb-4">
            <div class="flex-1">
              <div class="text-sm font-bold text-gold-text mb-1">${lo.key}</div>
              <div class="text-white text-sm font-semibold">${lo.title}</div>
            </div>
            <button type="button" onclick="cycleLOStatus('${lo.key}')" class="${btnClass} text-white text-xs font-bold px-3 py-1 rounded-full transition-all ml-4">
              ${btnLabel}
            </button>
          </div>

          <div class="space-y-4 mt-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <div class="text-xs text-gray-400 mb-2 font-semibold">Assessment Date</div>
                <input type="date" id="date_${lo.key}" value="${outcome.date || ''}" class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none" oninput="updateLO('${lo.key}', 'date', this.value)" />
              </div>
            </div>

            <div>
              <div class="text-xs text-gray-400 mb-2 font-semibold">Evidence & Feedback for ${lo.key}</div>
              <textarea id="feedback_${lo.key}" placeholder="Record assessor feedback, evidence locations, and reflections..." class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none" rows="3" oninput="updateLO('${lo.key}', 'feedback', this.value)">${outcome.feedback || ''}</textarea>
            </div>

            ${lo.acs.length > 0 ? `
              <div class="pt-2 border-t border-white border-opacity-10">
                <div class="text-xs text-gray-400 font-semibold mb-2">Assessment Criteria</div>
                <div class="space-y-2">
                  ${lo.acs.map(ac => `
                    <div class="ac-row rounded px-3 py-2 flex items-center justify-between">
                      <span class="text-xs text-gray-300">${ac}</span>
                      <span class="text-xs text-gray-500">Evidence reviewed</span>
                    </div>
                  `).join('')}
                </div>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function updateLO(loKey, field, value) {
    if (!loOutcomes[loKey]) loOutcomes[loKey] = {};
    loOutcomes[loKey][field] = value;
  }

  function cycleLOStatus(loKey) {
    const current = loOutcomes[loKey].status;
    if (current === '') {
      loOutcomes[loKey].status = 'pass';
    } else if (current === 'pass') {
      loOutcomes[loKey].status = 'refer';
    } else {
      loOutcomes[loKey].status = '';
    }
    renderLOs();
  }

  function setOverallStatus(status) {
    overallStatus = status;
    updateOverallButtons();
  }

  function updateOverallButtons() {
    const passBtn = document.getElementById('overallPassBtn');
    const referBtn = document.getElementById('overallReferBtn');
    
    passBtn.className = overallStatus === 'pass' ? 'toggle-passed text-white text-sm font-bold py-3 rounded-lg hover:opacity-90 transition-all' : 'toggle-off text-white text-sm font-bold py-3 rounded-lg hover:opacity-90 transition-all';
    referBtn.className = overallStatus === 'refer' ? 'toggle-referred text-white text-sm font-bold py-3 rounded-lg hover:opacity-90 transition-all' : 'toggle-off text-white text-sm font-bold py-3 rounded-lg hover:opacity-90 transition-all';
  }

  async function submitForm(e) {
    e.preventDefault();

    // Validate declarations
    if (!document.getElementById('declPlagiarism').checked || 
        !document.getElementById('declAccuracy').checked || 
        !document.getElementById('declConsent').checked) {
      showStatus('Please tick all declaration boxes before submitting.', 'error');
      return;
    }

    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    try {
      // Build lo_dates JSON
      const loDates = {};
      UNIT_CONFIG.los.forEach(lo => {
        const outcome = loOutcomes[lo.key];
        loDates[lo.key] = {
          date: outcome.date || null,
          status: outcome.status || '',
          feedback: outcome.feedback || ''
        };
      });

      // Find earliest date
      const allDates = Object.values(loDates)
        .filter(lo => lo.date)
        .map(lo => lo.date)
        .sort();
      const passedDate = allDates.length > 0 ? allDates[0] : null;

      const payload = {
        user_id: traineeId,
        unit: UNIT_CONFIG.unit,
        status: overallStatus === 'refer' ? 'referred' : 'pre_passed',
        passed_date: passedDate,
        feedback: document.getElementById('overallFeedback').value || '',
        set_by_assessor: assessorUser.full_name || assessorUser.username || 'Assessor',
        lo_dates: JSON.stringify(loDates)
      };

      let result;
      if (currentRecord) {
        // Update existing
        const { error } = await sb.from('unit_overrides')
          .update(payload)
          .eq('id', currentRecord.id);
        if (error) throw error;
      } else {
        // Insert new
        const { data, error } = await sb.from('unit_overrides')
          .insert(payload)
          .select()
          .single();
        if (error) throw error;
        currentRecord = data;
      }

      showStatus('✓ Assessment submitted successfully', 'success');
      setTimeout(() => window.history.back(), 2000);

    } catch (err) {
      showStatus(`Error: ${err.message}`, 'error');
      btn.disabled = false;
      btn.textContent = 'Submit Assessment';
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = type === 'error' ? 'text-center text-xs mb-4 text-red-400' : 'text-center text-xs mb-4 text-green-400';
  }

  init();

</script>
</body>
</html>
