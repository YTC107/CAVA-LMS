<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PT Academy – Learner Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #f5f5f5; }
    .pt-btn { background-color: #d4af37; color: #2a2a2a; font-weight: 600; }
    .pt-btn:hover { background-color: #c9a227; }
    input:focus { outline: none; box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8 border-t-4" style="border-color: #d4af37;">
    <div class="flex justify-center mb-6">
      <img src="pt-academy-logo.png" alt="PT Academy" class="h-24" />
    </div>
    <h1 class="text-2xl font-bold text-center mb-1" style="color: #2a2a2a;">PT Academy</h1>
    <p class="text-sm text-center mb-6" style="color: #666;">Level 3 Certificate in Assessing Vocational Achievement</p>

    <div id="error-box" class="hidden bg-red-100 border border-red-400 text-red-700 text-sm rounded-lg px-4 py-3 mb-5"></div>

    <form id="login-form" class="space-y-5">
      <div>
        <label class="block font-semibold text-sm mb-1" style="color: #2a2a2a;">Email address</label>
        <input id="email" type="email" required placeholder="you@example.com"
          class="w-full rounded-lg px-4 py-3 text-sm border border-gray-300" style="background-color: #f5f5f5;"/>
      </div>
      <div>
        <label class="block font-semibold text-sm mb-1" style="color: #2a2a2a;">Password</label>
        <input id="password" type="password" required placeholder="••••••••"
          class="w-full rounded-lg px-4 py-3 text-sm border border-gray-300" style="background-color: #f5f5f5;"/>
      </div>
      <button type="submit" class="w-full rounded-lg py-3 text-sm transition pt-btn">
        Sign in
      </button>
    </form>
  </div>

  <script>
    const SUPABASE_URL = 'https://qwjejqqgkvkroqhmfglg.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_ACTUAL_ANON_KEY_HERE';

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.add('hidden');
      errorBox.textContent = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        errorBox.textContent = 'Incorrect email or password. Please try again.';
        errorBox.classList.remove('hidden');
        return;
      }

      localStorage.setItem('cava_token', data.access_token);
      localStorage.setItem('cava_user', JSON.stringify(data.user));

      window.location.href = 'assessor-hub.html';
    });
  </script>
</body>
</html>
