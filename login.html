<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CAVA – Learner Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="supabase-integration.js"></script>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-gray-900 rounded-2xl shadow-2xl p-8">
    <h1 class="text-white text-2xl font-bold text-center mb-1">Focus Awards</h1>
    <p class="text-gray-400 text-sm text-center mb-8">Level 3 Certificate in Assessing Vocational Achievement</p>

    <div id="error-box" class="hidden bg-red-900 border border-red-600 text-red-200 text-sm rounded-lg px-4 py-3 mb-5"></div>

    <form id="login-form" class="space-y-5">
      <div>
        <label class="block text-gray-300 text-sm mb-1" for="email">Email address</label>
        <input id="email" type="email" required placeholder="you@example.com"
          class="w-full bg-gray-800 text-white rounded-lg px-4 py-3 text-sm border border-gray-700 focus:outline-none focus:border-indigo-500"/>
      </div>
      <div>
        <label class="block text-gray-300 text-sm mb-1" for="password">Password</label>
        <input id="password" type="password" required placeholder="••••••••"
          class="w-full bg-gray-800 text-white rounded-lg px-4 py-3 text-sm border border-gray-700 focus:outline-none focus:border-indigo-500"/>
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-lg py-3 text-sm transition">
        Sign in
      </button>
    </form>
  </div>

  <script>
    const SUPABASE_URL = 'https://qwjejqqgkvkroqhmfglg.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_D9A-jP6vvE6OhTm8cpxhPA_hR25r8tj';

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.add('hidden');
      errorBox.textContent = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        errorBox.textContent = 'Incorrect email or password. Please try again.';
        errorBox.classList.remove('hidden');
        return;
      }

      // Extract full name from user_metadata, fall back to email if not set
      const metadata = data.user?.user_metadata || {};
      const fullName = metadata.full_name || metadata.name || '';
      const firstName = fullName.split(' ')[0] || '';

      // Store session and user info
      localStorage.setItem('cava_token', data.access_token);
      localStorage.setItem('cava_user', JSON.stringify({
        ...data.user,
        full_name: fullName,
        first_name: firstName
      }));

      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
